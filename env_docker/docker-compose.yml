services:
  isaacsim:
    build:
      context: ..
      dockerfile: env_docker/Dockerfile
    image: isaac-unitree-env:custom
    container_name: issacsim
    stdin_open: true
    tty: true
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /home/hma/Videos:/videos
      - ../GVHMR:/hackathon_ws/GVHMR
      - ../GMR:/hackathon_ws/GMR
      - ../train_data:/hackathon_ws/train_data
      - ../whole_body_tracking:/hackathon_ws/whole_body_tracking
      - ../IsaacLab_v2.1.0:/hackathon_ws/IsaacLab_v2.1.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]